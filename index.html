<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Prototype V19 - Plein Écran 1P & CPU Mobile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .game-area {
            position: relative;
            background: #06060b;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            border: 2px solid #333;
        }
        #webcam {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            object-fit: cover;
            opacity: 0.15;
            z-index: 1;
            pointer-events: none;
        }
        .gun {
            position: absolute;
            width: 160px;
            height: 95px;
            z-index: 10;
            transform-origin: center center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 75px;
            pointer-events: none;
            transition: opacity 0.1s;
        }
        #gun0 { filter: drop-shadow(0 0 15px #0000ff); }
        #gun1 { filter: drop-shadow(0 0 15px #ff0000); }

        .gun-render {
            transform: scaleX(-1);
            display: inline-block;
        }
        
        .bullet {
            position: absolute;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ffffff;
            z-index: 9;
            pointer-events: none;
        }
        .bullet-blue { box-shadow: 0 0 10px #0000ff, 0 0 20px #0000ff; }
        .bullet-red { box-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000; }

        .bullet-trail {
            position: absolute;
            height: 6px;
            border-radius: 3px;
            transform-origin: left center;
            z-index: 8;
            pointer-events: none;
        }
        .trail-blue { background: linear-gradient(to left, rgba(0, 0, 255, 0.9), rgba(0, 0, 255, 0)); }
        .trail-red { background: linear-gradient(to left, rgba(255, 0, 0, 0.9), rgba(255, 0, 0, 0)); }

        .explosion-particle {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            z-index: 15;
            pointer-events: none;
        }
        .hand-cursor {
            position: absolute;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            z-index: 12;
            pointer-events: none;
            display: none;
            border: 2px solid #fff;
        }
        .color-p1 { background: #0000ff; box-shadow: 0 0 15px #0000ff; }
        .color-p2 { background: #ff0000; box-shadow: 0 0 15px #ff0000; }
        
        #loadingOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 13, 26, 0.95);
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="game-area" id="mainStage">
        <div id="loadingOverlay">
            <div id="spinner" class="spinner-border text-warning mb-3" role="status"></div>
            <h3 id="statusText" class="fw-bold mb-4 text-center">Libération de l'espace joueur...</h3>
            
            <div id="menuButtons" class="d-none text-center">
                <button id="btn1P" class="btn btn-primary btn-lg fw-bold m-2 px-4 py-3">👤 1 JOUEUR (vs CPU)</button>
                <button id="btn2P" class="btn btn-danger btn-lg fw-bold m-2 px-4 py-3">⚔️ 2 JOUEURS (Local)</button>
            </div>
        </div>

        <video id="webcam" autoplay playsinline></video>
        
        <div id="gun0" class="gun"><span class="gun-render">🔫</span></div>
        <div id="gun1" class="gun"><span class="gun-render">🔫</span></div>

        <div id="hand0" class="hand-cursor color-p1"></div>
        <div id="hand1" class="hand-cursor color-p2"></div>
    </div>

    <script type="module">
        import { FilesetResolver, HandLandmarker } from "https://unpkg.com/@mediapipe/tasks-vision@0.10.8/vision_bundle.mjs";

        const video = document.getElementById('webcam');
        const mainStage = document.getElementById('mainStage');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const statusText = document.getElementById('statusText');
        const spinner = document.getElementById('spinner');
        const btn1P = document.getElementById('btn1P');
        const btn2P = document.getElementById('btn2P');
        const menuButtons = document.getElementById('menuButtons');
        
        const gunElements = [document.getElementById('gun0'), document.getElementById('gun1')];
        const handElements = [document.getElementById('hand0'), document.getElementById('hand1')];

        let handLandmarker = undefined;
        let lastVideoTime = -1;
        let lastHandsData = [];
        let isRunning = false;
        let isMatchOver = false;
        let gameMode = 2; 

        let GAME_WIDTH = 450;
        let GAME_HEIGHT = 800;
        
        const GRAVITY = 0.08; 
        const BOUNCE = -0.55; 
        const RECOIL_FORCE = 12; 
        const MAX_ROTATION_SPEED = 18; 
        const ROTATION_FRICTION = 0.982; 

        let guns = [];
        let bullets = [];
        let trails = []; 
        let particles = []; 
        
        let playersState = [
            { triggerReady: true, cooldown: 0 },
            { triggerReady: true, cooldown: 0 }
        ];

        function initGuns() {
            const randomX1 = GAME_WIDTH * (0.15 + Math.random() * 0.25);
            const randomX2 = GAME_WIDTH * (0.60 + Math.random() * 0.25);
            
            const randomY1 = GAME_HEIGHT * (0.20 + Math.random() * 0.25);
            const randomY2 = GAME_HEIGHT * (0.50 + Math.random() * 0.25); 

            const randomAngle1 = -45 + Math.random() * 90;
            const randomAngle2 = 135 + Math.random() * 90;

            guns = [
                { id: 0, x: randomX1, y: randomY1, vx: 0.3, vy: 0, angle: randomAngle1, vAngle: 0, width: 160, height: 95, alive: true, color: '#0000ff' },
                { id: 1, x: randomX2, y: randomY2, vx: -0.3, vy: 0, angle: randomAngle2, vAngle: 0, width: 160, height: 95, alive: true, color: '#ff0000' }
            ];
            
            bullets = [];
            trails = [];
            particles = [];
            isMatchOver = false;
            gunElements[0].style.opacity = "1";
            gunElements[1].style.opacity = "1";
        }

        function resizeResponsiveStage() {
            const screenW = window.innerWidth;
            const screenH = window.innerHeight;

            if (screenW / screenH > 9 / 16) {
                GAME_HEIGHT = screenH * 0.95;
                GAME_WIDTH = GAME_HEIGHT * (9 / 16);
            } else {
                GAME_WIDTH = screenW * 0.95;
                GAME_HEIGHT = GAME_WIDTH / (9 / 16);
            }

            mainStage.style.width = `${GAME_WIDTH}px`;
            mainStage.style.height = `${GAME_HEIGHT}px`;
        }

        resizeResponsiveStage();
        window.addEventListener('resize', resizeResponsiveStage);

        async function initIA() {
            try {
                const vision = await FilesetResolver.forVisionTasks("https://unpkg.com/@mediapipe/tasks-vision@0.10.8/wasm");
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numHands: 2,
                    minHandDetectionConfidence: 0.45,
                    minHandPresenceConfidence: 0.45
                });
                if(spinner) spinner.classList.add('d-none');
                if(statusText) statusText.innerText = "Sélectionne le mode de jeu :";
                if(menuButtons) menuButtons.classList.remove('d-none');
            } catch (err) {
                if(statusText) statusText.innerText = "Erreur IA : " + err;
            }
        }

        async function launchGame(mode) {
            gameMode = mode;
            if(menuButtons) menuButtons.classList.add('d-none');
            if(spinner) spinner.classList.remove('d-none');
            statusText.innerText = "Démarrage caméra...";

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 320, height: 240, frameRate: { ideal: 30 } } 
                });
                video.srcObject = stream;
                video.addEventListener('loadeddata', () => {
                    if(loadingOverlay) loadingOverlay.classList.add('d-none');
                    initGuns();
                    isRunning = true;
                    requestAnimationFrame(gameLoop);
                });
            } catch (err) {
                alert("Impossible d'accéder à la webcam.");
            }
        }

        btn1P.addEventListener('click', () => launchGame(1));
        btn2P.addEventListener('click', () => launchGame(2));

        function explodeGun(gun) {
            gun.alive = false;
            gunElements[gun.id].style.opacity = "0"; 
            for (let i = 0; i < 40; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1.5 + Math.random() * 4;
                particles.push({
                    x: gun.x,
                    y: gun.y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    alpha: 1.0,
                    size: 6 + Math.random() * 8,
                    color: gun.color 
                });
            }
        }

        function triggerWin(winnerIndex) {
            setTimeout(() => {
                if(loadingOverlay) loadingOverlay.classList.remove('d-none');
                if(spinner) spinner.classList.add('d-none');
                
                const couleurClass = winnerIndex === 0 ? "text-primary" : "text-danger";
                const nomJoueur = winnerIndex === 0 ? "BLEU" : "ROUGE";
                
                if (gameMode === 1) {
                    statusText.innerHTML = winnerIndex === 0 ? 
                        `<span class='text-primary fs-3 fw-bold'>🏆 VICTOIRE ! 🏆</span><br><small class='text-muted'>Round suivant dans 2s...</small>` : 
                        `<span class='text-danger fs-3 fw-bold'>💥 GAME OVER 💥</span><br><small class='text-muted'>Revanche dans 2s...</small>`;
                } else {
                    statusText.innerHTML = `<span class='${couleurClass} fs-3 fw-bold'>🏆 LE JOUEUR ${nomJoueur} GAGNE ! 🏆</span><br><small class='text-muted'>Prochain round dans 2s...</small>`;
                }

                setTimeout(() => {
                    initGuns();
                    if(loadingOverlay) loadingOverlay.classList.add('d-none');
                }, 2000);
            }, 1000); 
        }

        function gameLoop() {
            if (!isRunning) return;

            if (video.currentTime !== lastVideoTime && handLandmarker && !isMatchOver) {
                lastVideoTime = video.currentTime;
                try {
                    const detections = handLandmarker.detectForVideo(video, performance.now());
                    if (detections && detections.landmarks) {
                        lastHandsData = detections.landmarks;
                    }
                } catch(e) {}
            }

            // --- PHYSIQUE DES FUSILS ---
            guns.forEach((gun, idx) => {
                if (!gun.alive) return;

                gun.vy += GRAVITY;
                gun.x += gun.vx;
                gun.y += gun.vy;
                
                gun.angle += gun.vAngle;
                gun.vAngle *= ROTATION_FRICTION; 

                if (gun.x - gun.width/2 < 0) { gun.x = gun.width/2; gun.vx *= BOUNCE; }
                else if (gun.x + gun.width/2 > GAME_WIDTH) { gun.x = GAME_WIDTH - gun.width/2; gun.vx *= BOUNCE; }

                if (gun.y - gun.height/2 < 0) { gun.y = gun.height/2; gun.vy *= BOUNCE; }
                else if (gun.y + gun.height/2 > GAME_HEIGHT) { gun.y = GAME_HEIGHT - gun.height/2; gun.vy *= BOUNCE; }

                gunElements[idx].style.left = `${gun.x - gun.width/2}px`;
                gunElements[idx].style.top = `${gun.y - gun.height/2}px`;
                gunElements[idx].style.transform = `rotate(${gun.angle}deg)`;
            });

            // --- LOGIQUE AUTONOME DU CPU (MODE 1 JOUEUR) ---
            if (gameMode === 1 && guns[1].alive && !isMatchOver) {
                if (playersState[1].cooldown > 0) {
                    playersState[1].cooldown--;
                } else {
                    const radCPU = (guns[1].angle) * Math.PI / 180;
                    const dx = guns[0].x - guns[1].x;
                    const dy = guns[0].y - guns[1].y;
                    const angleToPlayer = Math.atan2(dy, dx);
                    
                    let diffAngle = angleToPlayer - radCPU;
                    diffAngle = Math.atan2(Math.sin(diffAngle), Math.cos(diffAngle));

                    if (Math.abs(diffAngle) < 0.40) {
                        const dispersion = (-0.18 + Math.random() * 0.36); 
                        shootGun(1, dispersion);
                        playersState[1].cooldown = 18; 
                    } else { 
                        shootGun(1, 0); 
                        playersState[1].cooldown = 14; 
                    }
                }
            }

            // --- NETTOYAGE VISUEL ---
            document.querySelectorAll('.bullet').forEach(b => b.remove());
            document.querySelectorAll('.bullet-trail').forEach(t => t.remove());
            document.querySelectorAll('.explosion-particle').forEach(p => p.remove());

            // --- PARTICULES ---
            particles = particles.filter(p => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.03; p.alpha -= 0.02;
                if (p.alpha <= 0) return false;

                const pEl = document.createElement('div');
                pEl.className = 'explosion-particle';
                pEl.style.width = `${p.size}px`; pEl.style.height = `${p.size}px`;
                pEl.style.left = `${p.x}px`; pEl.style.top = `${p.y}px`;
                pEl.style.opacity = p.alpha;
                pEl.style.background = `radial-gradient(circle, #fff, ${p.color})`;
                pEl.style.boxShadow = `0 0 10px ${p.color}`;
                mainStage.appendChild(pEl);
                return true;
            });

            // --- TRAÎNÉES ---
            trails = trails.filter(t => {
                t.alpha -= 0.06; 
                if (t.alpha <= 0) return false;

                const trailEl = document.createElement('div');
                trailEl.className = `bullet-trail ${t.owner === 0 ? 'trail-blue' : 'trail-red'}`;
                trailEl.style.width = `${t.width}px`;
                trailEl.style.left = `${t.x}px`;
                trailEl.style.top = `${t.y}px`;
                trailEl.style.transform = `rotate(${t.rad}rad)`;
                trailEl.style.opacity = t.alpha; 
                mainStage.appendChild(trailEl);
                return true;
            });

            // --- BALLES ---
            bullets = bullets.filter(b => {
                const oldX = b.x;
                const oldY = b.y;

                b.x += b.vx; 
                b.y += b.vy;

                if (b.x < 0 || b.x > GAME_WIDTH || b.y < 0 || b.y > GAME_HEIGHT) return false;

                let hitTarget = false;
                guns.forEach(targetGun => {
                    if (!targetGun.alive || targetGun.id === b.owner || isMatchOver) return;

                    const distToGun = Math.hypot(b.x - targetGun.x, b.y - targetGun.y);
                    if (distToGun < 40) {
                        hitTarget = true;
                        explodeGun(targetGun);
                        isMatchOver = true; 
                        triggerWin(b.owner);
                    }
                });

                if (hitTarget) return false;

                const dist = Math.hypot(b.x - oldX, b.y - oldY);
                const rad = Math.atan2(b.y - oldY, b.x - oldX);
                trails.push({ x: oldX, y: oldY, width: dist * 1.5, rad: rad, alpha: 1.0, owner: b.owner });

                const bEl = document.createElement('div');
                bEl.className = `bullet ${b.owner === 0 ? 'bullet-blue' : 'bullet-red'}`;
                bEl.style.left = `${b.x - 7}px`; 
                bEl.style.top = `${b.y - 7}px`;
                mainStage.appendChild(bEl);

                return true;
            });

            // --- INTERACTION MAINS CORRIGÉE POUR LE FULL-SCREEN 1P ---
            handElements[0].style.display = "none";
            handElements[1].style.display = "none";
            if (playersState[0].cooldown > 0) playersState[0].cooldown--;
            if (gameMode === 2 && playersState[1].cooldown > 0) playersState[1].cooldown--;

            if (!isMatchOver) {
                let detectedHands = [];
                lastHandsData.forEach((landmarks) => {
                    if(landmarks && landmarks[5] && landmarks[8]) {
                        const indexMcp = landmarks[5];
                        const indexTip = landmarks[8];

                        const rawX = (1 - indexMcp.x) * GAME_WIDTH;
                        const rawY = indexMcp.y * GAME_HEIGHT;

                        const indexDrop = indexTip.y - indexMcp.y;
                        const triggerActive = indexDrop > 0.038; 

                        detectedHands.push({ x: rawX, y: rawY, trigger: triggerActive });
                    }
                });

                detectedHands.forEach((hand) => {
                    // CHANGEMENT CLÉ : En mode 1 Joueur, pIdx reste toujours 0 (Bleu), peu importe la position X sur l'écran !
                    let pIdx = (gameMode === 1) ? 0 : (hand.x < GAME_WIDTH / 2 ? 0 : 1);

                    if (guns[pIdx].alive) {
                        handElements[pIdx].style.display = "block";
                        handElements[pIdx].style.left = `${hand.x - 12}px`;
                        handElements[pIdx].style.top = `${hand.y - 12}px`;

                        if (hand.trigger) {
                            if (playersState[pIdx].triggerReady && playersState[pIdx].cooldown === 0) {
                                shootGun(pIdx, 0); 
                                playersState[pIdx].cooldown = 12; 
                                playersState[pIdx].triggerReady = false; 
                            }
                        } else {
                            playersState[pIdx].triggerReady = true; 
                        }
                    }
                });
            }

            requestAnimationFrame(gameLoop);
        }

        function shootGun(index, angleModifier = 0) {
            const gun = guns[index];
            if (!gun.alive) return;

            const rad = ((gun.angle) * Math.PI / 180) + angleModifier;

            const offsetCanon = 44; 
            const bulletX = gun.x + Math.cos(rad) * offsetCanon;
            const bulletY = gun.y + Math.sin(rad) * offsetCanon;

            const bulletSpeed = 22;
            const bVx = Math.cos(rad) * bulletSpeed;
            const bVy = Math.sin(rad) * bulletSpeed;

            bullets.push({ x: bulletX, y: bulletY, vx: bVx, vy: bVy, owner: index });

            gun.vx -= Math.cos(rad) * RECOIL_FORCE * 0.8;
            gun.vy -= Math.sin(rad) * RECOIL_FORCE * 0.8;

            let torque = 10 + Math.random() * 8; 
            if (Math.random() > 0.75) {
                torque = -torque;
            }

            gun.vAngle += torque;

            if (gun.vAngle > MAX_ROTATION_SPEED) gun.vAngle = MAX_ROTATION_SPEED;
            if (gun.vAngle < -MAX_ROTATION_SPEED) gun.vAngle = -MAX_ROTATION_SPEED;
        }

        initIA();
    </script>
</body>
</html>
